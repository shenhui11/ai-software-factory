name: 01-产品决策系统

on:
  workflow_dispatch:
    inputs:
      feature_id:
        description: "需求编号，例如 FEAT-0001"
        required: true
        type: string
      raw_requirement:
        description: "一句话需求"
        required: true
        type: string

jobs:
  decision-system:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      FEATURE_ID: ${{ github.event.inputs.feature_id }}
      RAW_REQUIREMENT: ${{ github.event.inputs.raw_requirement }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装 Codex CLI
        run: npm install -g @openai/codex

      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip
          pip install jsonschema

      - name: 生成 Codex 配置
        run: |
          mkdir -p ~/.codex
          cat > ~/.codex/config.toml <<EOF
          model = "gpt-5.4"
          model_reasoning_effort = "low"
          model_provider = "newapi"
          approval_policy = "never"
          sandbox_mode = "danger-full-access"

          [model_providers.newapi]
          name = "newapi"
          base_url = "${CODEX_BASE_URL}"
          wire_api = "responses"
          env_key = "CODEX_API_KEY"
          EOF
        env:
          CODEX_BASE_URL: ${{ secrets.CODEX_BASE_URL }}

      - name: 预检查文件与目录
        run: |
          mkdir -p specs/brainstorm specs/scoring specs/decision specs/intake
          test -f "AGENTS.md"
          test -f "specs/prompts/brainstorm.md"
          test -f "specs/prompts/solution-structurer.md"
          test -f "specs/prompts/scoring.md"
          test -f "specs/prompts/decision.md"
          test -f "scripts/generate_spec.py"
          test -f "scripts/validate_spec.py"
          test -f "specs/schema/feature-spec.schema.json"

      - name: 打印运行上下文
        run: |
          echo "FEATURE_ID=${FEATURE_ID}"
          echo "RAW_REQUIREMENT=${RAW_REQUIREMENT}"
          pwd
          git status --short || true

      - name: 测试 runner 写权限
        run: |
          mkdir -p specs/brainstorm
          echo "probe" > "specs/brainstorm/__write_probe__.md"
          ls -lah specs/brainstorm
          test -s "specs/brainstorm/__write_probe__.md"

      - name: 生成 Brainstorm Prompt
        run: |
          sed "s/{feature_id}/${FEATURE_ID}/g" specs/prompts/brainstorm.md > /tmp/brainstorm.prompt
          printf "\n\n原始需求：%s\n" "$RAW_REQUIREMENT" >> /tmp/brainstorm.prompt

      - name: 预览 Brainstorm Prompt
        run: |
          echo "===== Brainstorm Prompt Preview ====="
          sed -n '1,160p' /tmp/brainstorm.prompt

      - name: 执行 Brainstorm
        env:
          CODEX_API_KEY: ${{ secrets.CODEX_API_KEY }}
        run: |
          PROMPT_CONTENT="$(cat /tmp/brainstorm.prompt)"
          codex exec --skip-git-repo-check "$PROMPT_CONTENT"

      - name: 校验 Brainstorm 输出
        run: |
          echo "===== specs/brainstorm ====="
          ls -lah specs/brainstorm || true
          echo "===== target ====="
          test -f "specs/brainstorm/${FEATURE_ID}.md"
          test -s "specs/brainstorm/${FEATURE_ID}.md"
          echo "===== preview ====="
          sed -n '1,80p' "specs/brainstorm/${FEATURE_ID}.md"

      - name: 生成 Solution Structuring Prompt
        run: |
          sed "s/{feature_id}/${FEATURE_ID}/g" specs/prompts/solution-structurer.md > /tmp/structurer.prompt

      - name: 预览 Solution Structuring Prompt
        run: |
          echo "===== Solution Structuring Prompt Preview ====="
          sed -n '1,160p' /tmp/structurer.prompt

      - name: 执行 Solution Structuring
        env:
          CODEX_API_KEY: ${{ secrets.CODEX_API_KEY }}
        run: |
          PROMPT_CONTENT="$(cat /tmp/structurer.prompt)"
          codex exec --skip-git-repo-check "$PROMPT_CONTENT"

      - name: 校验 Solution Structuring 输出
        run: |
          echo "===== specs/scoring ====="
          ls -lah specs/scoring || true
          echo "===== target ====="
          test -f "specs/scoring/${FEATURE_ID}.json"
          test -s "specs/scoring/${FEATURE_ID}.json"
          echo "===== preview ====="
          sed -n '1,80p' "specs/scoring/${FEATURE_ID}.json"

      - name: 生成 Scoring Prompt
        run: |
          sed "s/{feature_id}/${FEATURE_ID}/g" specs/prompts/scoring.md > /tmp/scoring.prompt

      - name: 预览 Scoring Prompt
        run: |
          echo "===== Scoring Prompt Preview ====="
          sed -n '1,160p' /tmp/scoring.prompt

      - name: 执行 Scoring
        env:
          CODEX_API_KEY: ${{ secrets.CODEX_API_KEY }}
        run: |
          PROMPT_CONTENT="$(cat /tmp/scoring.prompt)"
          codex exec --skip-git-repo-check "$PROMPT_CONTENT"

      - name: 校验 Scoring 输出
        run: |
          echo "===== specs/scoring ====="
          ls -lah specs/scoring || true
          echo "===== target ====="
          test -f "specs/scoring/${FEATURE_ID}.json"
          test -s "specs/scoring/${FEATURE_ID}.json"
          echo "===== preview ====="
          sed -n '1,120p' "specs/scoring/${FEATURE_ID}.json"

      - name: 生成 Decision Prompt
        run: |
          sed "s/{feature_id}/${FEATURE_ID}/g" specs/prompts/decision.md > /tmp/decision.prompt

      - name: 预览 Decision Prompt
        run: |
          echo "===== Decision Prompt Preview ====="
          sed -n '1,160p' /tmp/decision.prompt

      - name: 执行 Decision
        env:
          CODEX_API_KEY: ${{ secrets.CODEX_API_KEY }}
        run: |
          PROMPT_CONTENT="$(cat /tmp/decision.prompt)"
          codex exec --skip-git-repo-check "$PROMPT_CONTENT"

      - name: 校验 Decision 输出
        run: |
          echo "===== specs/decision ====="
          ls -lah specs/decision || true
          echo "===== target ====="
          test -f "specs/decision/${FEATURE_ID}.md"
          test -s "specs/decision/${FEATURE_ID}.md"
          echo "===== preview ====="
          sed -n '1,80p' "specs/decision/${FEATURE_ID}.md"

      - name: 生成 Intake JSON
        run: |
          python scripts/generate_spec.py \
            --feature_id "${FEATURE_ID}" \
            --requirement "${RAW_REQUIREMENT}"

      - name: 校验 Intake 输出
        run: |
          echo "===== specs/intake ====="
          ls -lah specs/intake || true
          echo "===== target ====="
          test -f "specs/intake/${FEATURE_ID}.json"
          test -s "specs/intake/${FEATURE_ID}.json"
          echo "===== preview ====="
          sed -n '1,120p' "specs/intake/${FEATURE_ID}.json"

      - name: 校验 Intake Schema
        run: |
          python scripts/validate_spec.py \
            "specs/intake/${FEATURE_ID}.json" \
            "specs/schema/feature-spec.schema.json"

      - name: 提交 01 产物
        run: |
          git config user.name "Hui Shen"
          git config user.email "295225478@qq.com"
          git add \
            "specs/brainstorm/${FEATURE_ID}.md" \
            "specs/scoring/${FEATURE_ID}.json" \
            "specs/decision/${FEATURE_ID}.md" \
            "specs/intake/${FEATURE_ID}.json"
          git diff --cached --quiet || git commit -m "docs: generate intake artifacts for ${FEATURE_ID}"
          git push
