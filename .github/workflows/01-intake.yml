name: 01-产品决策系统

on:
  workflow_dispatch:
    inputs:
      feature_id:
        description: "需求编号，例如 FEAT-0001"
        required: true
        type: string
      raw_requirement:
        description: "一句话需求"
        required: true
        type: string

jobs:
  decision-system:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      FEATURE_ID: ${{ github.event.inputs.feature_id }}
      RAW_REQUIREMENT: ${{ github.event.inputs.raw_requirement }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装 Codex CLI
        run: npm install -g @openai/codex

      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip
          pip install jsonschema

      - name: 生成 Codex 配置
        run: |
          mkdir -p ~/.codex
          cat > ~/.codex/config.toml <<EOF
          model = "gpt-5.4"
          model_reasoning_effort = "low"
          model_provider = "newapi"
          approval_policy = "never"
          sandbox_mode = "workspace-write"

          [model_providers.newapi]
          name = "newapi"
          base_url = "${CODEX_BASE_URL}"
          wire_api = "responses"
          env_key = "CODEX_API_KEY"
          EOF
        env:
          CODEX_BASE_URL: ${{ secrets.CODEX_BASE_URL }}

      - name: 预检查 prompt 与目录
        run: |
          mkdir -p specs/brainstorm specs/scoring specs/decision specs/intake
          test -f "specs/prompts/brainstorm.md"
          test -f "specs/prompts/solution-structurer.md"
          test -f "specs/prompts/scoring.md"
          test -f "specs/prompts/decision.md"
          test -f "scripts/generate_spec.py"
          test -f "specs/schema/feature-spec.schema.json"

      - name: 执行 Brainstorm
        env:
          CODEX_API_KEY: ${{ secrets.CODEX_API_KEY }}
        run: |
          sed "s/{feature_id}/${FEATURE_ID}/g" specs/prompts/brainstorm.md > /tmp/brainstorm.prompt
          printf "\n\n原始需求：%s\n" "$RAW_REQUIREMENT" >> /tmp/brainstorm.prompt
          codex exec --skip-git-repo-check "$(cat /tmp/brainstorm.prompt)"

      - name: 执行 Solution Structuring
        env:
          CODEX_API_KEY: ${{ secrets.CODEX_API_KEY }}
        run: |
          sed "s/{feature_id}/${FEATURE_ID}/g" specs/prompts/solution-structurer.md > /tmp/structurer.prompt
          codex exec --skip-git-repo-check "$(cat /tmp/structurer.prompt)"

      - name: 执行 Scoring
        env:
          CODEX_API_KEY: ${{ secrets.CODEX_API_KEY }}
        run: |
          sed "s/{feature_id}/${FEATURE_ID}/g" specs/prompts/scoring.md > /tmp/scoring.prompt
          codex exec --skip-git-repo-check "$(cat /tmp/scoring.prompt)"

      - name: 执行 Decision
        env:
          CODEX_API_KEY: ${{ secrets.CODEX_API_KEY }}
        run: |
          sed "s/{feature_id}/${FEATURE_ID}/g" specs/prompts/decision.md > /tmp/decision.prompt
          codex exec --skip-git-repo-check "$(cat /tmp/decision.prompt)"

      - name: 生成 Intake JSON
        run: |
          python scripts/generate_spec.py \
            --feature_id "${FEATURE_ID}" \
            --requirement "${RAW_REQUIREMENT}"

      - name: 校验输出文件
        run: |
          test -s "specs/brainstorm/${FEATURE_ID}.md"
          test -s "specs/scoring/${FEATURE_ID}.json"
          test -s "specs/decision/${FEATURE_ID}.md"
          test -s "specs/intake/${FEATURE_ID}.json"

      - name: 校验 Intake Schema
        run: |
          python scripts/validate_spec.py \
            "specs/intake/${FEATURE_ID}.json" \
            "specs/schema/feature-spec.schema.json"

      - name: 提交决策产物
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add \
            "specs/brainstorm/${FEATURE_ID}.md" \
            "specs/scoring/${FEATURE_ID}.json" \
            "specs/decision/${FEATURE_ID}.md" \
            "specs/intake/${FEATURE_ID}.json"
          git diff --cached --quiet || git commit -m "docs: 生成产品决策与 intake ${FEATURE_ID}"
          git push
