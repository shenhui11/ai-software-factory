name: 03-构建阶段

on:
  workflow_dispatch:
    inputs:
      feature_id:
        description: "需求编号，例如 FEAT-0001"
        required: true
        type: string

jobs:
  build-feature:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      FEATURE_ID: ${{ github.event.inputs.feature_id }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装 Codex CLI
        run: npm install -g @openai/codex

      - name: 生成 Codex 配置
        run: |
          mkdir -p ~/.codex
          cat > ~/.codex/config.toml <<EOF
          model = "gpt-5.4"
          model_reasoning_effort = "low"
          model_provider = "newapi"
          approval_policy = "never"
          sandbox_mode = "danger-full-access"

          [model_providers.newapi]
          name = "newapi"
          base_url = "${CODEX_BASE_URL}"
          wire_api = "responses"
          env_key = "CODEX_API_KEY"
          EOF
        env:
          CODEX_BASE_URL: ${{ secrets.CODEX_BASE_URL }}

      - name: 预检查输入文件
        run: |
          test -f "AGENTS.md"
          test -f "specs/prompts/builder.strict.md"
          test -f "docs/definition-of-done.md"
          test -f "docs/engineering-standards.md"
          test -f "docs/coding-rules.md"

          test -s "specs/intake/${FEATURE_ID}.json"
          test -s "specs/prd/${FEATURE_ID}.md"
          test -s "specs/architecture/${FEATURE_ID}.md"
          test -s "specs/test-plan/${FEATURE_ID}.md"
          test -s "specs/test-cases/${FEATURE_ID}.yaml"

      - name: 打印运行上下文
        run: |
          echo "FEATURE_ID=${FEATURE_ID}"
          pwd
          git status --short || true
          echo "===== specs 输入 ====="
          ls -lah specs/intake specs/prd specs/architecture specs/test-plan specs/test-cases || true

      - name: 创建基础目录
        run: |
          mkdir -p apps tests docs packages
          ls -lah .

      - name: 测试 runner 写权限
        run: |
          echo "probe" > apps/__write_probe__.txt
          echo "probe" > tests/__write_probe__.txt
          ls -lah apps
          ls -lah tests
          test -s apps/__write_probe__.txt
          test -s tests/__write_probe__.txt

      - name: 生成 Builder Prompt
        run: |
          sed "s/{feature_id}/${FEATURE_ID}/g" specs/prompts/builder.strict.md > /tmp/builder.prompt

      - name: 预览 Builder Prompt
        run: |
          echo "===== Builder Prompt Preview ====="
          sed -n '1,220p' /tmp/builder.prompt

      - name: 执行代码生成（Builder）
        env:
          CODEX_API_KEY: ${{ secrets.CODEX_API_KEY }}
        run: |
          PROMPT_CONTENT="$(cat /tmp/builder.prompt)"
          codex exec --skip-git-repo-check "$PROMPT_CONTENT"

      - name: 校验 Builder 真实输出
        run: |
          echo "===== 当前目录 ====="
          pwd

          echo "===== apps 目录内容 ====="
          ls -lah apps || true
          find apps -maxdepth 6 -type f | sort || true

          echo "===== tests 目录内容 ====="
          ls -lah tests || true
          find tests -maxdepth 6 -type f | sort || true

          echo "===== docs 目录内容 ====="
          ls -lah docs || true
          find docs -maxdepth 3 -type f | sort || true

          echo "===== git 状态 ====="
          git status --short || true

          echo "===== git diff 文件列表 ====="
          git diff --name-only || true

          echo "===== apps 非空检查 ====="
          test -n "$(find apps -type f | head -n 1)"

          echo "===== tests 非空检查 ====="
          test -n "$(find tests -type f | head -n 1)"

      - name: 校验未生成非法根目录
        run: |
          for dir in prd architecture test-plan test-cases; do
            if [ -d "$dir" ]; then
              echo "[ERROR] 生成了非法根目录: $dir"
              exit 1
            fi
          done

      - name: 预览关键生成文件
        run: |
          echo "===== apps 预览 ====="
          FIRST_APP_FILE="$(find apps -type f | head -n 1)"
          if [ -n "$FIRST_APP_FILE" ]; then
            echo "FILE=$FIRST_APP_FILE"
            sed -n '1,120p' "$FIRST_APP_FILE"
          fi

          echo "===== tests 预览 ====="
          FIRST_TEST_FILE="$(find tests -type f | head -n 1)"
          if [ -n "$FIRST_TEST_FILE" ]; then
            echo "FILE=$FIRST_TEST_FILE"
            sed -n '1,120p' "$FIRST_TEST_FILE"
          fi

      - name: 安装项目依赖
        run: |
          python -m pip install --upgrade pip

          if [ -f pyproject.toml ]; then
            python -m pip install -e . || true
          fi

          if [ -f requirements.txt ]; then
            python -m pip install -r requirements.txt || true
          fi

          if [ -f requirements-dev.txt ]; then
            python -m pip install -r requirements-dev.txt || true
          fi

          python -m pip install pytest fastapi httpx uvicorn

      - name: 运行 pytest
        run: |
          python -m pytest tests -q

      - name: 提交构建产物
        run: |
          git config user.name "Hui Shen"
          git config user.email "295225478@qq.com"

          git checkout -b feat/${FEATURE_ID} || git checkout feat/${FEATURE_ID}
          
          echo "===== 提交前状态 ====="
          git status --short
          
          git add -A

          echo "===== add 后状态 ====="
          git status --short

          git diff --cached --name-only

          git diff --cached --quiet || git commit -m "feat: implement ${FEATURE_ID}"
          git push --set-upstream origin feat/${FEATURE_ID}


