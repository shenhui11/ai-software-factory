name: 03-构建阶段

on:
  workflow_dispatch:
    inputs:
      feature_id:
        description: "需求编号，例如 FEAT-0001"
        required: true
        type: string

jobs:
  build-feature:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      FEATURE_ID: ${{ github.event.inputs.feature_id }}
      BUILD_BRANCH: feat/${{ github.event.inputs.feature_id }}-build-${{ github.run_id }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 校验 design 已审批
        run: |
          test -f "specs/review/${FEATURE_ID}.design.approved"

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装 Codex CLI
        run: npm install -g @openai/codex

      - name: 配置 Codex
        env:
          CODEX_BASE_URL: ${{ secrets.CODEX_BASE_URL }}
        run: |
          bash scripts/setup_codex.sh

      - name: 创建基础目录
        run: |
          mkdir -p apps tests docs packages
          echo "probe" > apps/__write_probe__.txt
          echo "probe" > tests/__write_probe__.txt

      - name: 执行 Builder
        env:
          CODEX_API_KEY: ${{ secrets.CODEX_API_KEY }}
        run: |
          sed "s/{feature_id}/${FEATURE_ID}/g" specs/prompts/builder.strict.md > /tmp/builder.prompt
          codex exec --skip-git-repo-check "$(cat /tmp/builder.prompt)"

      - name: 清理缓存目录
        run: |
          find apps tests -type d -name "__pycache__" -prune -exec rm -rf {} + || true

      - name: 校验生成结果
        run: |
          test -n "$(find apps -type f -name '*.py' ! -path '*/__pycache__/*' | head -n 1)"
          test -n "$(find tests -type f -name '*.py' ! -path '*/__pycache__/*' | head -n 1)"

      - name: 校验非法根目录
        run: |
          FOUND_BAD_DIR=0
          for dir in prd architecture test-plan test-cases; do
            if [ -d "$dir" ]; then
              echo "[ERROR] 生成了非法根目录: $dir"
              FOUND_BAD_DIR=1
            fi
          done
          if [ "$FOUND_BAD_DIR" -ne 0 ]; then
            exit 1
          fi

      - name: 清理探针文件
        run: |
          rm -f apps/__write_probe__.txt
          rm -f tests/__write_probe__.txt

      - name: 安装依赖并运行 pytest
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest fastapi httpx uvicorn
          if [ -f pyproject.toml ]; then python -m pip install -e . || true; fi
          if [ -f requirements.txt ]; then python -m pip install -r requirements.txt || true; fi
          if [ -f requirements-dev.txt ]; then python -m pip install -r requirements-dev.txt || true; fi
          python -m pytest tests -q

      - name: 提交构建产物
        run: |
          git config user.name "Hui Shen"
          git config user.email "295225478@qq.com"
          git checkout -b "${BUILD_BRANCH}"
          git add -A
          git diff --cached --quiet || git commit -m "feat: implement ${FEATURE_ID}"
          git push --set-upstream origin "${BUILD_BRANCH}"

