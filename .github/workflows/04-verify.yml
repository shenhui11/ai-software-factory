name: 04-验证阶段

on:
  pull_request:
    branches:
      - master
      - main
      - develop
  workflow_dispatch:
    inputs:
      ref_name:
        description: "可选：要验证的分支名或 commit SHA，不填则使用当前默认 checkout"
        required: false
        type: string

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: 检出代码（PR）
        if: ${{ github.event_name == 'pull_request' }}
        uses: actions/checkout@v4

      - name: 检出代码（手动）
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref_name != '' }}
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref_name }}

      - name: 检出代码（手动默认）
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref_name == '' }}
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 打印运行上下文
        run: |
          echo "EVENT_NAME=${GITHUB_EVENT_NAME}"
          echo "REF=${GITHUB_REF}"
          echo "HEAD_REF=${GITHUB_HEAD_REF}"
          echo "BASE_REF=${GITHUB_BASE_REF}"
          echo "SHA=${GITHUB_SHA}"
          pwd
          git status --short || true

      - name: 打印仓库结构
        run: |
          echo "===== 根目录 ====="
          find . -maxdepth 2 | sort

      - name: 校验核心文件存在
        run: |
          test -f "AGENTS.md"
          test -f "docs/definition-of-done.md"
          test -f "docs/engineering-standards.md"
          test -f "docs/coding-rules.md"

      - name: 校验未生成非法根目录
        run: |
          echo "===== 仓库根目录目录列表 ====="
          find . -maxdepth 1 -type d | sort

          FOUND_BAD_DIR=0
          for dir in prd architecture test-plan test-cases; do
            if [ -d "$dir" ]; then
              echo "[ERROR] 非法根目录存在: $dir"
              ls -lah "$dir" || true
              FOUND_BAD_DIR=1
            fi
          done

          if [ "$FOUND_BAD_DIR" -ne 0 ]; then
            exit 1
          fi

      - name: 校验 apps 与 tests 非空
        run: |
          echo "===== apps 目录内容 ====="
          ls -lah apps || true
          find apps -maxdepth 8 -type f | sort || true

          echo "===== tests 目录内容 ====="
          ls -lah tests || true
          find tests -maxdepth 8 -type f | sort || true

          test -d apps
          test -d tests
          test -n "$(find apps -type f | head -n 1)"
          test -n "$(find tests -type f | head -n 1)"

      - name: 校验未残留探针文件
        run: |
          if [ -f apps/__write_probe__.txt ]; then
            echo "[ERROR] apps/__write_probe__.txt 不应提交到仓库"
            exit 1
          fi

          if [ -f tests/__write_probe__.txt ]; then
            echo "[ERROR] tests/__write_probe__.txt 不应提交到仓库"
            exit 1
          fi

      - name: 打印 git 状态与差异
        run: |
          echo "===== git status ====="
          git status --short || true

          echo "===== tracked diff ====="
          git diff --name-only || true

          echo "===== untracked ====="
          git ls-files --others --exclude-standard || true

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip

          if [ -f pyproject.toml ]; then
            python -m pip install -e . || true
          fi

          if [ -f requirements.txt ]; then
            python -m pip install -r requirements.txt || true
          fi

          if [ -f requirements-dev.txt ]; then
            python -m pip install -r requirements-dev.txt || true
          fi

          python -m pip install pytest fastapi httpx uvicorn

      - name: 预览关键文件
        run: |
          echo "===== apps 预览 ====="
          FIRST_APP_FILE="$(find apps -type f | head -n 1)"
          if [ -n "$FIRST_APP_FILE" ]; then
            echo "FILE=$FIRST_APP_FILE"
            sed -n '1,120p' "$FIRST_APP_FILE"
          fi

          echo "===== tests 预览 ====="
          FIRST_TEST_FILE="$(find tests -type f | head -n 1)"
          if [ -n "$FIRST_TEST_FILE" ]; then
            echo "FILE=$FIRST_TEST_FILE"
            sed -n '1,120p' "$FIRST_TEST_FILE"
          fi

      - name: 运行 pytest
        run: |
          python -m pytest tests -q

      - name: 输出验证完成信息
        run: |
          echo "04-verify completed successfully."


