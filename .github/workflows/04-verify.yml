name: 04-验证阶段

on:
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          if [ -f pyproject.toml ]; then python -m pip install -e . || true; fi
          if [ -f requirements.txt ]; then python -m pip install -r requirements.txt || true; fi
          if [ -f requirements-dev.txt ]; then python -m pip install -r requirements-dev.txt || true; fi
          python -m pip install pytest

      - name: 检查非法根目录
        run: |
          for dir in prd architecture test-plan test-cases; do
            if [ -d "$dir" ]; then
              echo "[ERROR] 非法根目录: $dir"
              exit 1
            fi
          done

      - name: 运行 pytest
        run: |
          python -m pytest tests -q
