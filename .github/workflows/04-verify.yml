name: 04-验证阶段

on:
  pull_request:
    branches:
      - master
      - main
      - develop
  workflow_dispatch:
    inputs:
      target_ref:
        description: "真实分支名或 commit SHA，例如 feat/FEAT-0002-build-24340754528"
        required: true
        type: string

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: 检出代码（PR）
        if: ${{ github.event_name == 'pull_request' }}
        uses: actions/checkout@v4

      - name: 检出代码（手动）
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.target_ref }}

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 校验核心文件与结构
        run: |
          test -f "AGENTS.md"
          test -f "docs/definition-of-done.md"
          test -f "docs/engineering-standards.md"
          test -f "docs/coding-rules.md"
          test -n "$(find apps -type f -name '*.py' ! -path '*/__pycache__/*' | head -n 1)"
          test -n "$(find tests -type f -name '*.py' ! -path '*/__pycache__/*' | head -n 1)"

      - name: 校验非法根目录
        run: |
          for dir in prd architecture test-plan test-cases; do
            if [ -d "$dir" ]; then
              echo "[ERROR] 非法根目录存在: $dir"
              exit 1
            fi
          done

      - name: 校验未残留探针文件
        run: |
          test ! -f apps/__write_probe__.txt
          test ! -f tests/__write_probe__.txt

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest fastapi uvicorn httpx
          if [ -f pyproject.toml ]; then python -m pip install -e . || true; fi
          if [ -f requirements.txt ]; then python -m pip install -r requirements.txt || true; fi
          if [ -f requirements-dev.txt ]; then python -m pip install -r requirements-dev.txt || true; fi

      - name: 运行 pytest
        run: |
          python -m pytest tests -q

      - name: 启动 FastAPI
        run: |
          nohup python -m uvicorn apps.backend.main:app --host 127.0.0.1 --port 8000 > uvicorn.log 2>&1 &
          echo $! > uvicorn.pid

      - name: 等待服务启动
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8000/docs > /dev/null; then
              echo "FastAPI is up"
              exit 0
            fi
            sleep 2
          done
          cat uvicorn.log || true
          exit 1

      - name: 冒烟测试
        run: |
          curl -f http://127.0.0.1:8000/docs

      - name: 打印服务日志
        if: always()
        run: |
          cat uvicorn.log || true

      - name: 关闭服务
        if: always()
        run: |
          if [ -f uvicorn.pid ]; then
            kill "$(cat uvicorn.pid)" || true
          fi
