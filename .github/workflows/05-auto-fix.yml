name: 05-自动修复

on:
  workflow_run:
    workflows: ["04-验证阶段"]
    types: [completed]

jobs:
  auto-fix:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装 Codex CLI
        run: npm install -g @openai/codex

      - name: 生成 Codex 配置
        run: |
          mkdir -p ~/.codex
          cat > ~/.codex/config.toml <<EOF
          model = "gpt-5.4"
          model_reasoning_effort = "low"
          model_provider = "newapi"
          approval_policy = "never"
          sandbox_mode = "danger-full-access"

          [model_providers.newapi]
          name = "newapi"
          base_url = "${CODEX_BASE_URL}"
          wire_api = "responses"
          env_key = "CODEX_API_KEY"
          EOF
        env:
          CODEX_BASE_URL: ${{ secrets.CODEX_BASE_URL }}

      - name: 安装项目依赖
        run: |
          python -m pip install --upgrade pip
          if [ -f pyproject.toml ]; then python -m pip install -e . || true; fi
          if [ -f requirements.txt ]; then python -m pip install -r requirements.txt || true; fi
          if [ -f requirements-dev.txt ]; then python -m pip install -r requirements-dev.txt || true; fi
          python -m pip install pytest

      - name: 收集失败上下文
        run: |
          mkdir -p .autofix
          echo "Workflow: ${{ github.event.workflow_run.name }}" > .autofix/context.txt
          echo "Conclusion: ${{ github.event.workflow_run.conclusion }}" >> .autofix/context.txt
          echo "Branch: ${{ github.event.workflow_run.head_branch }}" >> .autofix/context.txt
          echo "Head SHA: ${{ github.event.workflow_run.head_sha }}" >> .autofix/context.txt
          echo "" >> .autofix/context.txt
          echo "最近的 git 状态：" >> .autofix/context.txt
          git status --short >> .autofix/context.txt || true
      
      - name: 预检查 auto-fix prompt
        run: |
          test -f "specs/prompts/auto-fix.strict.md"
          test -f "AGENTS.md"

      - name: 执行自动修复
        env:
          CODEX_API_KEY: ${{ secrets.CODEX_API_KEY }}
        run: |
          codex exec --skip-git-repo-check "$(cat specs/prompts/auto-fix.strict.md)"

          请先阅读：
          - AGENTS.md
          - .autofix/context.txt
          - pyproject.toml
          - Makefile
          - tests/ 下的失败相关文件
          - apps/ 下的相关实现文件

          目标：
          修复导致 04-验证阶段 失败的最小必要问题。

          强制约束：
          1. 只能修复最小范围。
          2. 不允许删除测试、跳过测试、放宽断言来伪造通过。
          3. 不允许关闭 verify 步骤。
          4. 不允许创建根目录：
             - prd
             - architecture
             - test-plan
             - test-cases
          5. 只允许修改：
             - apps/
             - packages/
             - tests/
             - docs/
             - pyproject.toml
             - requirements*.txt
             - Makefile

          完成后：
          - 输出修改文件列表
          - 输出修复原因
          - 输出测试命令
          "

      - name: 再次检查非法根目录
        run: |
          for dir in prd architecture test-plan test-cases; do
            if [ -d "$dir" ]; then
              echo "[ERROR] 非法根目录: $dir"
              exit 1
            fi
          done

      - name: 再跑 pytest
        run: |
          python -m pytest tests -q

      - name: 提交自动修复结果
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git diff --cached --quiet || git commit -m "fix: 自动修复 verify 失败"
          git push
