name: 05-自动修复

on:
  workflow_dispatch:
    inputs:
      feature_id:
        description: "需求编号，例如 FEAT-0001"
        required: true
        type: string
      target_ref:
        description: "需要修复的构建分支，例如 feat/FEAT-0001-build-xxx"
        required: true
        type: string

  workflow_run:
    workflows: ["04-验证阶段"]
    types: [completed]

jobs:
  auto-fix:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest

    permissions:
      contents: write
      actions: read

    env:
      FEATURE_ID: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.feature_id || '' }}
      TARGET_REF: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.target_ref || github.event.workflow_run.head_branch }}
      WORKFLOW_VERSION: "05-auto-fix-v2-strict"

    steps:
      - name: 检出待修复分支
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_REF }}
          fetch-depth: 0

      - name: 打印 workflow 版本和分支信息
        run: |
          set -euo pipefail

          echo "WORKFLOW_VERSION=${WORKFLOW_VERSION}"
          echo "EVENT_NAME=${{ github.event_name }}"
          echo "FEATURE_ID=${FEATURE_ID}"
          echo "TARGET_REF=${TARGET_REF}"
          git branch --show-current || true
          git rev-parse HEAD

      - name: 推导 feature_id
        run: |
          set -euo pipefail

          if [ -z "${FEATURE_ID}" ]; then
            FEATURE_ID="$(ls specs/review/*.build.completed 2>/dev/null | head -n 1 | sed -E 's#specs/review/(.*)\.build\.completed#\1#')"
          fi

          if [ -z "${FEATURE_ID}" ]; then
            echo "[ERROR] 无法推导 FEATURE_ID"
            exit 1
          fi

          echo "FEATURE_ID=${FEATURE_ID}" >> "$GITHUB_ENV"
          echo "TARGET_REF=${TARGET_REF}" >> "$GITHUB_ENV"

          echo "FEATURE_ID=${FEATURE_ID}"
          echo "TARGET_REF=${TARGET_REF}"

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装 Codex CLI
        run: |
          set -euo pipefail
          npm install -g @openai/codex
          codex --version || true

      - name: 配置 Codex
        env:
          CODEX_BASE_URL: ${{ secrets.CODEX_BASE_URL }}
        run: |
          set -euo pipefail
          test -n "${CODEX_BASE_URL}"

          mkdir -p ~/.codex
          cat > ~/.codex/config.toml <<EOF
          model = "gpt-5.4"
          model_reasoning_effort = "low"
          model_provider = "newapi"
          approval_policy = "never"
          sandbox_mode = "danger-full-access"

          [model_providers.newapi]
          name = "newapi"
          base_url = "${CODEX_BASE_URL}"
          wire_api = "responses"
          env_key = "CODEX_API_KEY"
          EOF

      - name: 安装项目依赖
        run: |
          set -euo pipefail

          python -m pip install --upgrade pip

          if [ -f requirements.txt ]; then
            python -m pip install -r requirements.txt
          fi

          if [ -f requirements-dev.txt ]; then
            python -m pip install -r requirements-dev.txt
          fi

          python -m pip install pytest fastapi uvicorn httpx pydantic

          if [ -f pyproject.toml ]; then
            python -m pip install -e . || echo "[WARN] editable install failed, continue with PYTHONPATH=."
          fi

      - name: 收集失败上下文
        run: |
          set -euo pipefail

          mkdir -p .autofix

          {
            echo "Workflow: 04-验证阶段"
            echo "Event name: ${{ github.event_name }}"
            echo "Branch: ${TARGET_REF}"
            echo "Feature ID: ${FEATURE_ID}"
            echo "Head SHA: $(git rev-parse HEAD)"
            echo ""
            echo "Git status:"
            git status --short || true
            echo ""
            echo "Top-level files:"
            find . -maxdepth 2 -type f | sort || true
            echo ""
            echo "Apps files:"
            find apps -maxdepth 5 -type f | sort || true
            echo ""
            echo "Tests files:"
            find tests -maxdepth 5 -type f | sort || true
            echo ""
            echo "Specs review:"
            find specs/review -maxdepth 2 -type f | sort || true
          } > .autofix/context.txt

          cat .autofix/context.txt

      - name: 预检查 auto-fix prompt
        run: |
          set -euo pipefail
          test -f "specs/prompts/auto-fix.strict.md"
          test -f "AGENTS.md"

      - name: 生成自动修复 Prompt
        run: |
          set -euo pipefail

          cat specs/prompts/auto-fix.strict.md > /tmp/auto-fix.prompt

          cat >> /tmp/auto-fix.prompt <<'EOF'

          ## 本次自动修复任务

          请先阅读：
          - AGENTS.md
          - .autofix/context.txt
          - specs/prd/{feature_id}.md
          - specs/architecture/{feature_id}.md
          - specs/test-plan/{feature_id}.md
          - specs/test-cases/{feature_id}.yaml
          - pyproject.toml
          - Makefile
          - tests/ 下的失败相关文件
          - apps/ 下的相关实现文件

          目标：
          修复导致 04-验证阶段失败的最小必要问题。

          优先修复以下常见问题：
          1. 删除非法根目录：
             - prd
             - architecture
             - test-plan
             - test-cases
          2. 修复 pytest 失败
          3. 修复 Web build 失败
          4. 修复缺失的启动说明或测试说明

          强制约束：
          1. 只能修复最小范围。
          2. 不允许删除测试、跳过测试、放宽断言来伪造通过。
          3. 不允许关闭 verify 步骤。
          4. 不允许修改 04-验证阶段 workflow 来绕过校验。
          5. 不允许创建根目录：
             - prd
             - architecture
             - test-plan
             - test-cases
          6. 如果发现上述非法根目录存在，必须删除它们。
          7. 只允许修改：
             - apps/
             - packages/
             - tests/
             - docs/
             - pyproject.toml
             - requirements.txt
             - requirements-dev.txt
             - Makefile
             - package.json
             - pnpm-workspace.yaml

          完成前必须执行：
          - find apps -type f | sort
          - find tests -type f | sort
          - git status --short

          完成后输出：
          - 修改文件列表
          - 修复原因
          - 测试命令
          - 未完成项
          EOF

          sed -i "s/{feature_id}/${FEATURE_ID}/g" /tmp/auto-fix.prompt

          echo "===== AUTO FIX PROMPT PREVIEW ====="
          sed -n '1,220p' /tmp/auto-fix.prompt

      - name: 执行自动修复
        env:
          CODEX_API_KEY: ${{ secrets.CODEX_API_KEY }}
        run: |
          set -euo pipefail
          codex exec --skip-git-repo-check "$(cat /tmp/auto-fix.prompt)"

      - name: 再次检查非法根目录
        run: |
          set -euo pipefail

          for dir in prd architecture test-plan test-cases; do
            if [ -d "$dir" ]; then
              echo "[ERROR] 非法根目录仍然存在: $dir"
              exit 1
            fi
          done

      - name: 再跑 pytest
        run: |
          set -euo pipefail
          PYTHONPATH=. python -m pytest -q

      - name: 安装 Web 依赖并构建
        working-directory: apps/web
        run: |
          set -euo pipefail
          npm install
          npm run build

      - name: 校验 Web 构建产物
        run: |
          set -euo pipefail
          test -d apps/web/dist
          test -n "$(find apps/web/dist -type f | head -n 1)"

      - name: 生成自动修复标记
        run: |
          set -euo pipefail

          mkdir -p specs/review docs/auto-fix

          cat > "docs/auto-fix/${FEATURE_ID}.auto-fix-report.md" <<EOF
          # Auto Fix Report - ${FEATURE_ID}

          ## Result
          COMPLETED

          ## Target Ref
          ${TARGET_REF}

          ## Workflow Version
          ${WORKFLOW_VERSION}

          ## Checks After Fix
          - Illegal root directories: PASSED
          - Python tests: PASSED
          - Web build: PASSED

          ## Fixed At
          $(date -u +"%Y-%m-%dT%H:%M:%SZ")
          EOF

          cat > "specs/review/${FEATURE_ID}.auto-fix.completed" <<EOF
          auto-fix completed
          feature_id: ${FEATURE_ID}
          target_ref: ${TARGET_REF}
          workflow_version: ${WORKFLOW_VERSION}
          completed_at: $(date -u +"%Y-%m-%dT%H:%M:%SZ")
          EOF

      - name: 提交自动修复结果
        run: |
          set -euo pipefail

          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "没有自动修复变更。"
          else
            git commit -m "fix: auto-fix verify failure ${FEATURE_ID}"
            git push
          fi

      - name: 输出下一步
        run: |
          set -euo pipefail
          echo "05-auto-fix 完成。"
          echo "请重新运行 04-verify。"
          echo "feature_id=${FEATURE_ID}"
          echo "target_ref=${TARGET_REF}"
