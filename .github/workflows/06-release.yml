name: 06-release

on:
  workflow_dispatch:
    inputs:
      version:
        required: true
        type: string

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - run: echo "Deploy staging for version ${{ github.event.inputs.version }}"

  deploy-production:
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - run: echo "Deploy production for version ${{ github.event.inputs.version }}"
