feature_id: FEAT-0002
title: 成长积分型会员体系测试用例
scope:
  in_scope:
    - 会员档案与会员面板
    - 任务中心与每日签到
    - 积分账户与积分流水
    - 自动升级与权益映射
    - 奖励记录
    - 运营配置读取、更新、发布与生效
    - 权限控制、幂等、频控和审计
  out_of_scope:
    - 支付与订阅
    - 积分商城与库存管理
    - 企业组织和席位
    - 复杂反作弊平台
    - 多 SKU 权益商品化
test_cases:
  - id: TC-HP-001
    title: 登录用户查询自己的会员档案
    category: happy_path
    level: integration
    priority: P0
    coverage:
      acceptance_criteria: [1]
      api:
        - GET /api/v1/members/me
    preconditions:
      - 用户已登录
      - 用户已完成会员档案和积分账户初始化
    steps:
      - 请求会员档案接口
    expected:
      - 返回 membership_status、current_level、growth_value、next_level、growth_to_next_level、points_balance
      - 会员状态与等级字段可被前端直接展示

  - id: TC-HP-002
    title: 查询会员面板聚合数据
    category: happy_path
    level: integration
    priority: P0
    coverage:
      acceptance_criteria: [1, 5]
      api:
        - GET /api/v1/members/me/dashboard
    preconditions:
      - 用户已登录
      - 已存在至少一个任务配置和一个权益映射
    steps:
      - 请求会员面板接口
    expected:
      - 返回当前等级、成长进度、积分余额、已解锁权益、待完成任务、最近奖励
      - 面板中的积分和等级与会员档案一致

  - id: TC-HP-003
    title: 查询当前可见任务列表
    category: happy_path
    level: integration
    priority: P0
    coverage:
      acceptance_criteria: [3, 5, 7]
      api:
        - GET /api/v1/members/me/tasks
    preconditions:
      - 用户已登录
      - 已存在已发布的任务配置
    steps:
      - 请求任务列表
    expected:
      - 返回启用中的任务
      - 每个任务包含 task_code、title、task_type、reward_points、status、progress、daily_reset_at

  - id: TC-HP-004
    title: 当日首次签到成功并发放积分
    category: happy_path
    level: e2e
    priority: P0
    coverage:
      acceptance_criteria: [2, 3, 8, 9]
      api:
        - POST /api/v1/members/me/check-ins
        - GET /api/v1/members/me/points/ledger
    preconditions:
      - 用户已登录
      - 当日尚未签到
      - 签到任务已启用并已发布
    steps:
      - 提交签到请求
      - 查询积分流水
    expected:
      - 返回 success、granted_points、points_balance、current_level、level_up、unlocked_benefits
      - 积分余额增加
      - 流水中新增 source_type=check_in 的记录

  - id: TC-HP-005
    title: 完成任务后自动发分并记录来源
    category: happy_path
    level: e2e
    priority: P0
    coverage:
      acceptance_criteria: [2, 3, 9]
      api:
        - POST /api/v1/members/me/tasks/{task_code}/complete
        - GET /api/v1/members/me/points/ledger
    preconditions:
      - 用户已登录
      - 目标任务已启用且可完成
    steps:
      - 提交任务完成请求
      - 查询积分流水
    expected:
      - 返回 task_code、completion_status、granted_points、points_balance、level_up、reward_result
      - 流水中新增 source_type=task_completion 的记录
      - 流水记录包含任务来源、时间和积分数值

  - id: TC-HP-006
    title: 达到门槛后自动升级并展示权益生效
    category: happy_path
    level: e2e
    priority: P0
    coverage:
      acceptance_criteria: [4, 5, 6, 9]
      api:
        - POST /api/v1/members/me/tasks/{task_code}/complete
        - GET /api/v1/members/me
        - GET /api/v1/members/me/dashboard
        - GET /api/v1/members/me/rewards
    preconditions:
      - 用户已登录
      - 用户距离升级门槛仅差一次有效任务奖励
      - 已存在已发布的等级门槛和权益映射
    steps:
      - 完成触发升级的任务
      - 查询会员档案
      - 查询会员面板
      - 查询奖励记录
    expected:
      - 当前等级自动提升
      - membership_status 和 current_level 更新
      - 面板显示新解锁权益
      - 奖励记录可见升级相关结果

  - id: TC-HP-007
    title: 查询积分流水和奖励记录
    category: happy_path
    level: integration
    priority: P1
    coverage:
      acceptance_criteria: [2, 5]
      api:
        - GET /api/v1/members/me/points/ledger
        - GET /api/v1/members/me/rewards
    preconditions:
      - 用户已有至少一条积分流水和一条奖励记录
    steps:
      - 按 change_type 查询积分流水
      - 查询奖励记录
    expected:
      - 流水支持分页和过滤
      - 奖励记录返回已获得奖励

  - id: TC-HP-008
    title: 运营人员更新并发布会员配置
    category: happy_path
    level: e2e
    priority: P0
    coverage:
      acceptance_criteria: [7, 9]
      api:
        - GET /api/v1/admin/member-config
        - PUT /api/v1/admin/member-config/tasks
        - PUT /api/v1/admin/member-config/levels
        - PUT /api/v1/admin/member-config/benefits
        - POST /api/v1/admin/member-config:publish
        - GET /api/v1/members/me/tasks
    preconditions:
      - 当前登录身份为运营人员
    steps:
      - 获取当前配置快照
      - 更新任务配置
      - 更新等级配置
      - 更新权益映射
      - 发布配置版本
      - 切换到普通用户请求任务列表
    expected:
      - 配置更新成功
      - 返回新的配置版本号和发布时间
      - 用户侧读取到已发布的新配置

  - id: TC-EDGE-001
    title: 用户重复签到不得重复加分
    category: edge_case
    level: integration
    priority: P0
    coverage:
      acceptance_criteria: [3, 8, 9]
      api:
        - POST /api/v1/members/me/check-ins
        - GET /api/v1/members/me/points/ledger
    preconditions:
      - 用户已在同一自然日成功签到一次
    steps:
      - 再次提交签到请求
      - 查询积分流水
    expected:
      - 第二次请求被拒绝或幂等返回
      - 不新增积分流水
      - 不重复增加积分余额

  - id: TC-EDGE-002
    title: 相同 request_id 重复提交任务完成不得重复记账
    category: edge_case
    level: integration
    priority: P0
    coverage:
      acceptance_criteria: [3, 8, 9]
      api:
        - POST /api/v1/members/me/tasks/{task_code}/complete
        - GET /api/v1/members/me/points/ledger
    preconditions:
      - 用户已登录
      - 目标任务可完成
    steps:
      - 使用同一 request_id 连续提交两次任务完成请求
      - 查询积分流水
    expected:
      - 系统最多只成功记账一次
      - 仅存在一条对应积分流水

  - id: TC-EDGE-003
    title: 已禁用任务不允许提交完成
    category: edge_case
    level: integration
    priority: P1
    coverage:
      acceptance_criteria: [3, 7]
      api:
        - POST /api/v1/members/me/tasks/{task_code}/complete
    preconditions:
      - 任务配置已禁用并已发布
    steps:
      - 提交该任务的完成请求
    expected:
      - 返回 4xx
      - 不新增积分流水或奖励记录

  - id: TC-EDGE-004
    title: 任务达到每日上限后再次触发应被拒绝
    category: edge_case
    level: integration
    priority: P1
    coverage:
      acceptance_criteria: [3, 7, 8]
      api:
        - POST /api/v1/members/me/tasks/{task_code}/complete
    preconditions:
      - 任务已达到当日 daily_limit
    steps:
      - 再次提交任务完成请求
    expected:
      - 返回拒绝结果
      - 不重复加分

  - id: TC-EDGE-005
    title: 未发布配置不会影响用户侧结果
    category: edge_case
    level: integration
    priority: P1
    coverage:
      acceptance_criteria: [7]
      api:
        - PUT /api/v1/admin/member-config/tasks
        - GET /api/v1/members/me/tasks
    preconditions:
      - 当前登录身份为运营人员
      - 已存在一个已发布配置版本
    steps:
      - 更新任务配置但不发布
      - 切换到普通用户查询任务列表
    expected:
      - 用户侧仍读取旧的已发布配置
      - 未发布变更不会立即生效

  - id: TC-EDGE-006
    title: 无效等级和权益映射配置发布失败
    category: edge_case
    level: integration
    priority: P0
    coverage:
      acceptance_criteria: [6, 7]
      api:
        - PUT /api/v1/admin/member-config/levels
        - PUT /api/v1/admin/member-config/benefits
        - POST /api/v1/admin/member-config:publish
    preconditions:
      - 当前登录身份为运营人员
    steps:
      - 提交门槛顺序错误或重复 level_code 的等级配置
      - 提交引用无效 level_code 或 benefit_code 的权益映射
      - 尝试发布配置
    expected:
      - 发布失败
      - 返回统一错误结构和明确错误码

  - id: TC-EDGE-007
    title: 高频重复请求触发基础风控拦截
    category: edge_case
    level: e2e
    priority: P0
    coverage:
      acceptance_criteria: [8, 9]
      api:
        - POST /api/v1/members/me/check-ins
        - POST /api/v1/members/me/tasks/{task_code}/complete
    preconditions:
      - 用户已登录
      - 风控阈值已配置
    steps:
      - 在短时间窗口内重复提交签到或任务完成请求
    expected:
      - 系统返回风控拒绝结果
      - 返回 request_id
      - 不产生额外积分流水

  - id: TC-PERM-001
    title: 未登录用户不能访问会员档案和面板
    category: permission_case
    level: integration
    priority: P0
    coverage:
      acceptance_criteria: [1]
      api:
        - GET /api/v1/members/me
        - GET /api/v1/members/me/dashboard
    preconditions: []
    steps:
      - 在未登录状态访问会员档案和面板接口
    expected:
      - 返回 401 或等价鉴权失败状态
      - 错误结构符合统一规范

  - id: TC-PERM-002
    title: 普通用户不得访问运营配置接口
    category: permission_case
    level: integration
    priority: P0
    coverage:
      acceptance_criteria: [7]
      api:
        - GET /api/v1/admin/member-config
        - PUT /api/v1/admin/member-config/tasks
        - POST /api/v1/admin/member-config:publish
    preconditions:
      - 当前登录身份为普通用户
    steps:
      - 请求运营配置读取、更新和发布接口
    expected:
      - 所有请求均被拒绝
      - 不产生配置变更

  - id: TC-PERM-003
    title: 普通用户不得越权读取指定用户会员详情
    category: permission_case
    level: integration
    priority: P0
    coverage:
      acceptance_criteria: [1, 2]
      api:
        - GET /api/v1/admin/members/{user_id}
    preconditions:
      - 当前登录身份为普通用户
      - 系统中存在其他用户
    steps:
      - 使用普通用户身份查询其他用户会员详情
    expected:
      - 返回 403 或等价拒绝结果
      - 不暴露目标用户的会员、任务或流水信息

  - id: TC-PERM-004
    title: 运营人员可查询指定用户会员详情用于排查
    category: permission_case
    level: integration
    priority: P1
    coverage:
      acceptance_criteria: [7, 9]
      api:
        - GET /api/v1/admin/members/{user_id}
    preconditions:
      - 当前登录身份为运营人员
      - 目标用户存在
    steps:
      - 查询指定用户会员详情
    expected:
      - 返回目标用户会员详情、任务状态和最近流水
      - 响应不包含越界批量数据

  - id: TC-REG-001
    title: 签到记账必须同步生成积分流水
    category: regression_risk
    level: integration
    priority: P0
    coverage:
      acceptance_criteria: [2, 3, 9]
      api:
        - POST /api/v1/members/me/check-ins
        - GET /api/v1/members/me
        - GET /api/v1/members/me/points/ledger
    preconditions:
      - 用户已登录
      - 当日尚未签到
    steps:
      - 提交签到请求
      - 查询会员档案和积分流水
    expected:
      - points_balance 的变化与最新流水一致
      - 不存在余额变化但无流水的情况

  - id: TC-REG-002
    title: 升级与奖励发放共享同一业务上下文
    category: regression_risk
    level: integration
    priority: P0
    coverage:
      acceptance_criteria: [4, 6, 9]
      api:
        - POST /api/v1/members/me/tasks/{task_code}/complete
        - GET /api/v1/members/me/rewards
    preconditions:
      - 用户完成一次任务即可触发升级
    steps:
      - 提交任务完成请求
      - 查询奖励记录
    expected:
      - 升级结果和奖励结果属于同一次业务动作
      - 可通过 request_id 或等价上下文字段追溯

  - id: TC-REG-003
    title: 发布后的配置版本被用户侧服务正确读取
    category: regression_risk
    level: e2e
    priority: P0
    coverage:
      acceptance_criteria: [5, 6, 7]
      api:
        - PUT /api/v1/admin/member-config/tasks
        - POST /api/v1/admin/member-config:publish
        - GET /api/v1/members/me/tasks
    preconditions:
      - 当前登录身份为运营人员
    steps:
      - 更新任务积分值并发布
      - 切换到普通用户读取任务列表
    expected:
      - 用户侧看到最新 reward_points
      - 不会继续读取旧配置版本

  - id: TC-REG-004
    title: 错误响应始终符合统一结构
    category: regression_risk
    level: unit
    priority: P1
    coverage:
      acceptance_criteria: [8, 9]
      api:
        - POST /api/v1/members/me/check-ins
        - POST /api/v1/members/me/tasks/{task_code}/complete
        - POST /api/v1/admin/member-config:publish
    preconditions: []
    steps:
      - 分别构造鉴权失败、风控拦截、配置发布校验失败请求
    expected:
      - 所有失败响应均包含 error.code、error.message、error.details、request_id
