- 用例 ID: TC-FEAT-0100-001
  场景: 创作者成功创建小说项目
  前置条件:
    - 用户已登录
    - 至少存在一个启用中的系统模板
  步骤:
    - 打开项目创建页
    - 输入项目标题
    - 选择题材为玄幻
    - 选择篇幅为长篇
    - 选择一个启用中的模板
    - 提交创建
  预期结果:
    - 项目创建成功
    - 返回项目详情包含题材、篇幅、模板和自动生成开关状态
    - 系统生成初始章节列表或初始化工作台状态

- 用例 ID: TC-FEAT-0100-002
  场景: 停用模板不可用于新项目创建
  前置条件:
    - 用户已登录
    - 存在一个已停用模板
  步骤:
    - 请求模板列表或进入项目创建页
    - 尝试选择已停用模板创建项目
  预期结果:
    - 已停用模板不出现在可选列表中，或提交时被拒绝
    - 系统返回明确的模板不可用错误

- 用例 ID: TC-FEAT-0100-003
  场景: 大纲编辑器支持与故事编辑 Agent 多轮讨论
  前置条件:
    - 已存在一个小说项目和目标章节
  步骤:
    - 打开项目大纲编辑器
    - 查看当前章节大纲
    - 输入第一轮讨论消息请求提供章节走向建议
    - 输入第二轮讨论消息要求收紧角色冲突
  预期结果:
    - 每轮对话均返回故事编辑 Agent 回复
    - 对话记录被保存
    - 章节大纲或更新建议可被用户查看和继续编辑

- 用例 ID: TC-FEAT-0100-004
  场景: 系统为目标章节生成多个故事方案供用户选择
  前置条件:
    - 已存在一个小说项目和目标章节
    - 用户具有可用生成额度
  步骤:
    - 调用章节方案生成
    - 查看返回的候选走向和概要列表
  预期结果:
    - 至少返回两个候选方案
    - 每个方案包含概要或关键转折信息
    - 章节状态更新为已生成待确认

- 用例 ID: TC-FEAT-0100-005
  场景: 未确认章节方案时禁止生成正文
  前置条件:
    - 目标章节已生成候选方案但尚未确认
    - 用户具有可用生成额度
  步骤:
    - 直接请求生成章节正文
  预期结果:
    - 请求被拒绝
    - 系统返回“必须先确认大纲或方案”之类的业务错误
    - 章节状态保持不变

- 用例 ID: TC-FEAT-0100-006
  场景: 用户确认章节方案后成功生成正文草稿
  前置条件:
    - 目标章节存在多个候选方案
    - 用户具有可用生成额度
    - 项目存在结构化记忆数据
  步骤:
    - 选择一个候选方案并确认
    - 请求生成章节正文
  预期结果:
    - 方案确认成功并记录 selected_story_option_id
    - 正文草稿生成成功
    - 章节状态变更为待评审或待用户查看
    - 本次生成消耗被记录到额度台账

- 用例 ID: TC-FEAT-0100-007
  场景: 资深读者 Agent 评分通过时章节进入待确认状态
  前置条件:
    - 目标章节已生成正文草稿
    - 评审服务返回分数高于或等于阈值
  步骤:
    - 调用章节评审
  预期结果:
    - 返回评分结果和问题摘要
    - 章节 review_status 为 passed
    - 章节进入 awaiting_user 或等效待确认状态

- 用例 ID: TC-FEAT-0100-008
  场景: 资深读者 Agent 评分低于阈值时触发自动回流
  前置条件:
    - 目标章节已生成正文草稿
    - 当前 review_retry_count 小于最大回流次数
    - 评审服务返回分数低于阈值
  步骤:
    - 调用章节评审
  预期结果:
    - 章节进入 failed 后触发自动回流
    - review_retry_count 增加 1
    - 工作流回到前序生成或修订阶段
    - 返回结果中包含剩余回流次数或下一步状态

- 用例 ID: TC-FEAT-0100-009
  场景: 达到最大回流次数后系统停止自动重试
  前置条件:
    - 目标章节已多次评审失败
    - review_retry_count 已达到最大回流次数
  步骤:
    - 再次触发章节评审或工作流推进
  预期结果:
    - 系统不再自动回流
    - review_status 标记为 max_retry_reached 或等效阻塞状态
    - 决策权明确交还给用户

- 用例 ID: TC-FEAT-0100-010
  场景: 用户确认章节后更新结构化记忆
  前置条件:
    - 目标章节处于待确认状态
    - 章节存在最新正文版本
  步骤:
    - 用户执行章节确认
    - 查询项目结构化记忆和章节摘要
  预期结果:
    - 章节 final_status 为 confirmed
    - 角色、世界观、关键事件或章节摘要中至少相关部分得到更新
    - 新记忆快照可供后续章节生成复用

- 用例 ID: TC-FEAT-0100-011
  场景: 用户可执行整章重写且保留版本历史
  前置条件:
    - 目标章节已有一个正文版本
    - 用户具有可用生成额度
  步骤:
    - 对章节发起整章重写
    - 查询章节版本列表
  预期结果:
    - 生成新的章节版本
    - 原章节版本仍可追溯
    - 新版本 source_type 为 chapter_rewrite 或等效值

- 用例 ID: TC-FEAT-0100-012
  场景: 用户可对任意段落执行重写
  前置条件:
    - 目标章节已有正文内容和可识别段落
    - 用户具有可用生成额度
  步骤:
    - 选择一个段落
    - 发起段落重写
    - 查询最新章节版本内容
  预期结果:
    - 指定段落被替换为新内容
    - 非目标段落保持不变
    - 系统保留新的章节版本记录

- 用例 ID: TC-FEAT-0100-013
  场景: 用户可对任意段落执行扩写
  前置条件:
    - 目标章节已有正文内容和可识别段落
    - 用户具有可用生成额度
  步骤:
    - 选择一个段落
    - 发起段落扩写
    - 查询最新章节版本内容
  预期结果:
    - 指定段落内容被扩充
    - 原有段落语义保留且文本长度增加
    - 系统保留新的章节版本记录

- 用例 ID: TC-FEAT-0100-014
  场景: 生成类操作受会员额度控制
  前置条件:
    - 用户已登录
    - 用户当月额度和免费次数均已用尽
  步骤:
    - 请求章节方案生成或正文生成
  预期结果:
    - 请求被拒绝
    - 返回额度不足错误码或错误信息
    - 不产生新的生成结果和版本记录

- 用例 ID: TC-FEAT-0100-015
  场景: 自动生成模式可连续推进章节流程
  前置条件:
    - 项目已开启自动生成模式
    - 用户具备足够额度
    - 后续章节存在已满足推进条件的初始化状态
  步骤:
    - 启动自动生成
    - 查询工作流状态
  预期结果:
    - 系统开始按章节推进方案生成、正文生成、评审流程
    - 工作流状态返回当前章节、当前阶段和剩余回流次数等信息
    - 用户可看到流程持续推进而非单步执行

- 用例 ID: TC-FEAT-0100-016
  场景: 用户可暂停自动生成并接管流程
  前置条件:
    - 项目自动生成模式正在运行
  步骤:
    - 触发暂停自动生成
    - 查询工作流状态
    - 手动进入当前章节编辑或确认流程
  预期结果:
    - 自动生成状态变为暂停
    - 系统不再继续自动推进后续步骤
    - 用户可以人工接管当前章节决策

- 用例 ID: TC-FEAT-0100-017
  场景: 管理员可维护模板并影响前台可用性
  前置条件:
    - 管理员已登录后台
  步骤:
    - 新增一个项目初始化模板
    - 编辑模板内容并启用
    - 前台用户查询模板列表
  预期结果:
    - 新模板保存成功
    - 启用后前台可查询和选择该模板
    - 模板元数据与配置内容一致

- 用例 ID: TC-FEAT-0100-018
  场景: 管理员可配置会员权益并影响前台额度校验
  前置条件:
    - 管理员已登录后台
    - 存在一个可分配给用户的会员档位
  步骤:
    - 调整会员档位的免费次数或月额度
    - 将用户绑定到该会员档位
    - 用户执行生成类操作
  预期结果:
    - 新权益配置保存成功
    - 前台额度校验按最新配置生效
    - 权益规则来源于后台配置而非固定常量
