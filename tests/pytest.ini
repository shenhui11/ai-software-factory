[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 简化配置，移除可能导致问题的参数
addopts = 
    -v
    --tb=short
    --strict-markers
    # 注释掉覆盖率相关，或仅在需要时使用
    # --cov=app
    # --cov-report=term-missing
    # 移除并行和HTML报告参数
    # -n auto
    # --order-scope=module
    # --timeout=10
    # --html=test-results/report.html
    # --self-contained-html

# 标记定义
markers =
    slow: 运行较慢的测试
    integration: 集成测试
    unit: 单元测试
    db: 数据库测试
    anyio: 异步接口测试
