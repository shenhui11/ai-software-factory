[tool:pytest]
minversion = 7.0
addopts = 
    -v
    --strict-markers
    --tb=short
    --cov=app
    --cov-report=term-missing
    --cov-report=html:coverage_html
    --cov-report=xml:coverage.xml
    -n auto
    --order-scope=module
    --timeout=10

testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
